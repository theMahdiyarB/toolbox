<h1>قطع‌نامه</h1>
<p><a href="cat5054sec1.xhtml#poem-501005">تا شکوفه‌ی سُرخ يک پيراهن : به آیدا</a></p><p><a href="cat5054sec1.xhtml#poem-501006">قصيده برای انسانِ ماهِ بهمن : تو نمی‌دانی غریوِ یک عظمت</a></p><p><a href="cat5054sec1.xhtml#poem-501007">سرود ِ مردی که خودش را کُشته است : نه آبش دادم</a></p><p><a href="cat5054sec1.xhtml#poem-501008">سرود ِ بزرگ : به شن‌ـ‌چو، رفیقِ ناشناسِ کُره‌یی</a></p>
