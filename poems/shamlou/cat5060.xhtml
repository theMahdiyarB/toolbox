<h1>مرثیه‌های خاک</h1>
<p><a href="cat5060sec1.xhtml#poem-501148">شعر، رهایی‌ست : شعر</a></p><p><a href="cat5060sec1.xhtml#poem-501149">مرثیه : در خاموشیِ فروغ فرخ‌زاد</a></p><p><a href="cat5060sec1.xhtml#poem-501150">شبانه : پچپچه را</a></p><p><a href="cat5060sec1.xhtml#poem-501151">با چشم‌ها : با چشم‌ها</a></p><p><a href="cat5060sec1.xhtml#poem-501152">شامگاهی : ــ نظر در تو می‌کنم ای بامداد</a></p><p><a href="cat5060sec1.xhtml#poem-501153">هملت : بودن</a></p><p><a href="cat5060sec1.xhtml#poem-501154">و حسرتی : (به پاسخِ استقبالیه‌یی)</a></p><p><a href="cat5060sec1.xhtml#poem-501155">تمثیل : به پوران صلح‌کل و سیروس طاهباز</a></p><p><a href="cat5060sec1.xhtml#poem-501156">حکایت : اینک آهوبره‌یی</a></p><p><a href="cat5060sec1.xhtml#poem-501157">در آستانه : برای م. امید</a></p>
