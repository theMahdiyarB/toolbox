<h1>اشعار دیگر</h1>
<p><a href="cat2282sec1.xhtml#poem-86596">شمارهٔ  ۱ - من گرفتم تو نگیر : زن گرفتم شدم ای دوست به دام زن اسیر</a></p><p><a href="cat2282sec1.xhtml#poem-86597">شمارهٔ  ۲ - چه عجب؟ : وه چه خوب آمدی، صفا کردی</a></p><p><a href="cat2282sec1.xhtml#poem-86598">شمارهٔ  ۳ - کار و بار : ندانم از چه به هرجا که لفظ کار آید</a></p><p><a href="cat2282sec1.xhtml#poem-86599">شمارهٔ  ۴ - عاقبت ضعیفی : قصه شنیدم که بوالعلا به همه عمر</a></p><p><a href="cat2282sec1.xhtml#poem-86600">شمارهٔ  ۵ - خنده : باغ خندان ز گل خندان است</a></p>
</body></html>
