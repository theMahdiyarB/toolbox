<h1>در نیایش خداوند</h1>
<p><a href="cat124sec1.xhtml#poem-10209">سر آغاز : به نام خدایی که جان آفرید</a></p><p><a href="cat124sec1.xhtml#poem-10210">فی نعت سید المرسلین علیه الصلوة و السلام : کریم السجایا جمیل الشیم</a></p><p><a href="cat124sec1.xhtml#poem-10211">در سبب نظم کتاب : در اقصای گیتی بگشتم بسی</a></p><p><a href="cat124sec1.xhtml#poem-10212">ابوبکر بن سعد بن زنگی : مرا طبع از این نوع خواهان نبود</a></p><p><a href="cat124sec1.xhtml#poem-10213">محمد بن سعد بن ابوبکر : اتابک محمد شه نیکبخت</a></p><p><a href="cat124sec1.xhtml#poem-10214">حکایت : حکایت کنند از بزرگان دین</a></p>
