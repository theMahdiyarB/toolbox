<h1>دربارهٔ مهدی اخوان ثالث</h1>
<p>مهدی اخوان ثالث (م.امید) (۱۳۰۷-۱۳۶۹) شاعر نوگرای ایرانی و از پیروان سبک نیماست.
گزیده‌ای از اشعار این شاعر بزرگ توسط آقای مهران صمدنژاد برای گنجور رومیزی آماده شده است.</p>
