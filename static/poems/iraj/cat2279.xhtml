<h1>مربّع ترکیب</h1>
<p><a href="cat2279sec1.xhtml#poem-86572">شمارهٔ  ۱ - در انتقاد از اوضاع کشور : داش غلم مرگ تو حظ کردم از اشعار تو من</a></p><p><a href="cat2279sec1.xhtml#poem-86573">شمارهٔ  ۲ : قوام السلطنه به پیشکار داخلی خود میرزا قاسم خان گو ...</a></p>
