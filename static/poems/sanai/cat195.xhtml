<h1>مسمطات</h1>
<p><a href="cat195sec1.xhtml#poem-12733">شمارهٔ ۱ - افگنده در شور و شغب جان و دل عشاق را : ای کودک زیبا سلب سیمین بر و بیجاده لب</a></p><p><a href="cat195sec1.xhtml#poem-12735">شمارهٔ ۲ - از من جدا شد ناگهان بر من جهان شد چون قفس</a></p><p><a href="cat195sec1.xhtml#poem-27233">شمارهٔ ۳ - در مدح خواجه حکیم حسن اسعد غزنوی : حادثهٔ چرخ بین فایدهٔ روزگار</a></p>
