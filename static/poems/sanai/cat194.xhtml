<p><a href="cat194sec1.xhtml#poem-12729">شمارهٔ ۱ - ترکیب بند موشح در مدح خواجه امام محمد بن محمد</a></p><p><a href="cat194sec1.xhtml#poem-12730">شمارهٔ ۲ - ترکیب بند در مدح ایرانشاه : گر چه شاخ میوه دار آرایش بستان شود</a></p><p><a href="cat194sec1.xhtml#poem-12731">شمارهٔ ۳ - ترکیب بند در مدح مکین‌الدین : ای سنایی بگذر از جان در پناه تن مباش</a></p><p><a href="cat194sec1.xhtml#poem-12732">شمارهٔ ۴ - در مدح عمادالدین سیف‌الحق ابوالمفاخر محمدبن منصور</a></p>
