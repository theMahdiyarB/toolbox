<h1>پادشاهی یزدگرد هجده سال بود</h1>
<p><a href="cat84sec1.xhtml#poem-1816">بخش ۱ - پادشاهی یزدگرد هجده سال بود : چو شد پادشا بر جهان یزدگرد</a></p><p><a href="cat84sec1.xhtml#poem-1817">بخش ۲ - پادشاهی هرمز یک سال بود : چو هرمز برآمد به تخت پدر</a></p><p><a href="cat84sec1.xhtml#poem-1818">بخش ۳ - پادشاهی پیروز بیست و هفت سال بود : بیامد بتخت کیی برنشست</a></p><p><a href="cat84sec1.xhtml#poem-1819">بخش ۴ - پادشاهی بلاش پیروز چهار سال بود : چو بنشست با سوگ ماهی بلاش</a></p>
