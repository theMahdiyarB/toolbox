<h1>قصاید</h1>
<p><a href="cat27sec1.xhtml#poem-2127">قصیدهٔ شمارهٔ ۱ - در مدح شاه شجاع : شد عرصهٔ زمین چو بساط ارم جوان</a></p><p><a href="cat27sec1.xhtml#poem-2128">قصیدهٔ شمارهٔ ۲ - قصیدهٔ در مدح قوام الدین محمد صاحب عیار وزیر شاه شجاع</a></p><p><a href="cat27sec1.xhtml#poem-2129">قصیدهٔ شمارهٔ ۳ - قصیدهٔ در مدح شاه شیخ ابواسحاق : سپیده‌دم که صبا بوی لطف جان گیرد</a></p>
</body></html>
